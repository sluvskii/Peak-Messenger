name: iOS Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14 # latest stable macos runner

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Xcode version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Install XcodeGen
      run: brew install xcodegen
      
    - name: Generate Xcode Project
      run: xcodegen generate
      
    - name: Build Peak (Unsigned for SideStore)
      run: |
        xcodebuild clean build \
          -project Peak.xcodeproj \
          -scheme Peak \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO
          
    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r build/Build/Products/Release-iphoneos/Peak.app Payload/
        zip -r Peak.ipa Payload/
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Peak-IPA
        path: Peak.ipa
        retention-days: 7

    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: build-${{ github.run_number }}
        name: Peak Build #${{ github.run_number }}
        files: Peak.ipa
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
