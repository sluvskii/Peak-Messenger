name: Peak

options:
  bundleIdPrefix: com.peak
  deploymentTarget:
    iOS: "17.0"   # iOS 17 required for @Observable macro; bump to 26.0 once macos-26 runner is confirmed available on GitHub

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  Peak:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Peak/Sources
    info:
      path: Peak/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSCameraUsageDescription: "Peak needs camera access to send photos and video messages."
        NSMicrophoneUsageDescription: "Peak needs microphone access to send voice messages."
        NSPhotoLibraryUsageDescription: "Peak needs photo library access to send photos."
    settings:
      base:
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        SWIFT_VERSION: "5.10"
